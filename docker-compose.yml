services:
  app:
    build: .
    image: spendsense_app:latest
    container_name: spendsense_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    env_file:
      - .env
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: spendsense
      DB_USERNAME: root

  web:
    image: nginx:stable
    container_name: spendsense_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: spendsense_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: spendsense
      MYSQL_USER: user
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "3306:3306"
    networks:
      - app-network

  node:
    image: node:18
    container_name: spendsense_node
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["bash", "-c", "tail -f /dev/null"]
    networks:
      - app-network

volumes:
  dbdata:

networks:
  app-network:
    driver: bridge
