version: '3.8'

services:
  app:
    build: .
    image: spendsense_app:latest
    container_name: spendsense_app
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    networks:
      - app-network
    env_file:
      - .env
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: spendsense
      DB_USERNAME: root

  web:
    image: nginx:stable
    container_name: spendsense_web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: spendsense_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: spendsense
      MYSQL_USER: user
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network

  node:
    image: node:18
    container_name: spendsense_node
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["bash", "-c", "tail -f /dev/null"]
    networks:
      - app-network

volumes:
  dbdata:

networks:
  app-network:
    driver: bridge
